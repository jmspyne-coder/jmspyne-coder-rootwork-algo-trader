name: Close Blocked Validation

# One-shot job that runs the three data-blocked validation items from
# validation/VALIDATION_STATUS.md in CI, where the Alpaca repo secrets are valid
# (the local .env keys are deauthorized). It commits the regenerated validation
# artifacts and then DISABLES ITSELF so it never fires again. To rerun, an admin
# re-enables it from the Actions tab and dispatches once more.
#
# Manual dispatch only. It self-disables on a successful run, so a schedule would
# be pointless.

on:
  workflow_dispatch:

concurrency:
  group: close-blocked-validation
  cancel-in-progress: false

permissions:
  contents: write   # commit + push the regenerated validation artifacts
  actions: write    # disable this workflow after a successful run

env:
  ALPACA_API_KEY_ID: ${{ secrets.ALPACA_API_KEY_ID }}
  ALPACA_API_SECRET_KEY: ${{ secrets.ALPACA_API_SECRET_KEY }}
  ALPACA_PAPER: 'true'
  MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}

jobs:
  close-gaps:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - run: pip install -r requirements.txt

      # ── Blocked item 1: entry timing 5m vs 15m (B6) ──────────────────
      # 15-minute opening-range backtests. Exports backtest_{TICKER}_*.csv at
      # repo root (gitignored — kept as build artifacts below).
      - name: Entry timing — 15-min ORB backtests (B6)
        run: |
          python -m src.backtest --ticker QQQ --or-minutes 15 --start 2024-01-01 --end 2026-06-01
          python -m src.backtest --ticker SPY --or-minutes 15 --start 2024-01-01 --end 2026-06-01

      # ── Blocked item 2: PBO / CSCV (B3) ──────────────────────────────
      # Gap sweep persists per-config return series to
      # validation/gap_sweep_returns.csv, the input CSCV needs.
      - name: PBO/CSCV — gap param sweep (B3)
        run: python -m src.param_sweep_gap --ticker QQQ --start 2024-01-01 --end 2026-06-01

      # ── Blocked item 3: gap-size segmentation + suite refresh (B5) ────
      # Recomputes the validation suite (slippage cliff, DSR, bootstrap,
      # segmentation) over the freshly fetched data.
      - name: Segmentation + validation suite refresh (B5)
        run: python scripts/validation_suite.py

      # Preserve the gitignored intermediates (backtest + sweep exports) so the
      # 15-min runs are retrievable even though they are not committed.
      - name: Upload intermediate exports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-intermediates
          path: |
            backtest_*.csv
            sweep_results_*.csv
          if-no-files-found: ignore

      - name: Commit regenerated validation artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add validation results
          if git diff --cached --quiet; then
            echo "No validation output changes to commit."
          else
            git commit \
              -m "Regenerate blocked validation artifacts via Actions" \
              -m "Runs the three data-blocked items from validation/VALIDATION_STATUS.md (entry timing 15-min ORB, gap PBO/CSCV sweep, segmentation suite refresh) in CI where the Alpaca secrets are valid."
            git push
          fi

      # Runs only if every step above succeeded, so a bad-key run stays enabled
      # for a retry instead of silently switching off.
      - name: Self-disable this workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow disable close-blocked-validation.yml --repo "$GITHUB_REPOSITORY"
